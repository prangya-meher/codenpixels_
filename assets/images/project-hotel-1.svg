<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B00FF"/>
      <stop offset="100%" style="stop-color:#F5FF00"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Hotel image area -->
  <rect x="60" y="60" width="300" height="180" rx="12" fill="rgba(0,0,0,0.4)"/>
  <rect x="60" y="60" width="300" height="180" rx="12" fill="rgba(123,0,255,0.3)"/>
  <text x="210" y="165" font-size="60" text-anchor="middle" font-family="serif">🏨</text>
  <!-- Booking form -->
  <rect x="380" y="60" width="360" height="320" rx="14" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="560" y="92" font-size="14" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-family="Arial" font-weight="bold">BOOK YOUR STAY</text>
  <rect x="396" y="104" width="328" height="1" fill="rgba(255,255,255,0.1)"/>
  <!-- Form fields -->
  <text x="396" y="126" font-size="9" fill="rgba(255,255,255,0.5)" font-family="Arial" letter-spacing="2">CHECK-IN</text>
  <rect x="396" y="132" width="150" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(245,255,0,0.4)" stroke-width="1"/>
  <text x="411" y="153" font-size="11" fill="rgba(255,255,255,0.8)" font-family="Arial">15 Apr 2025</text>
  <text x="564" y="126" font-size="9" fill="rgba(255,255,255,0.5)" font-family="Arial" letter-spacing="2">CHECK-OUT</text>
  <rect x="564" y="132" width="150" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(245,255,0,0.4)" stroke-width="1"/>
  <text x="579" y="153" font-size="11" fill="rgba(255,255,255,0.8)" font-family="Arial">18 Apr 2025</text>
  <text x="396" y="186" font-size="9" fill="rgba(255,255,255,0.5)" font-family="Arial" letter-spacing="2">ROOM TYPE</text>
  <rect x="396" y="192" width="328" height="32" rx="8" fill="rgba(255,255,255,0.08)" stroke="rgba(255,45,120,0.4)" stroke-width="1"/>
  <text x="411" y="213" font-size="11" fill="rgba(255,255,255,0.8)" font-family="Arial">Deluxe Suite — King Bed</text>
  <!-- Calendar mini -->
  <rect x="396" y="236" width="328" height="100" rx="8" fill="rgba(255,255,255,0.05)"/>
  <text x="560" y="256" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-family="Arial">APRIL 2025</text>
  <rect x="410" y="262" width="300" height="1" fill="rgba(255,255,255,0.1)"/>
  <!-- Calendar days -->
  <text x="425" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">S</text>
  <text x="450" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">M</text>
  <text x="476" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">T</text>
  <text x="500" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">W</text>
  <text x="526" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">T</text>
  <text x="552" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">F</text>
  <text x="576" y="282" font-size="9" fill="rgba(255,255,255,0.4)" font-family="Arial">S</text>
  <!-- highlighted range -->
  <rect x="527" y="289" width="75" height="18" rx="3" fill="rgba(245,255,0,0.25)"/>
  <circle cx="540" cy="298" r="9" fill="rgba(255,45,120,0.8)"/>
  <text x="540" y="302" font-size="9" fill="white" text-anchor="middle" font-family="Arial">15</text>
  <text x="566" y="302" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial">16</text>
  <text x="591" y="302" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial">17</text>
  <circle cx="616" cy="298" r="9" fill="rgba(255,45,120,0.8)"/>
  <text x="616" y="302" font-size="9" fill="white" text-anchor="middle" font-family="Arial">18</text>
  <!-- Book button -->
  <rect x="396" y="347" width="328" height="22" rx="8" fill="rgba(255,45,120,1)"/>
  <text x="560" y="363" font-size="11" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">CONFIRM BOOKING — ₹12,500</text>
  <!-- Room cards below -->
  <rect x="60" y="255" width="140" height="90" rx="10" fill="rgba(0,0,0,0.45)" stroke="rgba(245,255,0,0.3)" stroke-width="1"/>
  <text x="130" y="295" font-size="24" text-anchor="middle" font-family="serif">🛏️</text>
  <text x="130" y="318" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial">Standard Room</text>
  <text x="130" y="333" font-size="10" fill="#F5FF00" text-anchor="middle" font-family="Arial" font-weight="bold">₹4,500/night</text>
  <rect x="215" y="255" width="145" height="90" rx="10" fill="rgba(255,45,120,0.3)" stroke="rgba(255,45,120,0.5)" stroke-width="1"/>
  <text x="287" y="295" font-size="24" text-anchor="middle" font-family="serif">🏰</text>
  <text x="287" y="318" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial">Deluxe Suite</text>
  <text x="287" y="333" font-size="10" fill="#FF2D78" text-anchor="middle" font-family="Arial" font-weight="bold">₹12,500/night</text>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="3">HOTELVISTA BOOKING</text>
</svg>
