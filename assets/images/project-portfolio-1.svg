  <text x="630" y="148" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle" font-family="Arial" letter-spacing="2">PREVIEW</text>
  <rect x="534" y="155" width="192" height="90" rx="6" fill="rgba(255,45,120,0.2)"/>
  <circle cx="630" cy="195" r="28" fill="rgba(255,45,120,0.5)"/>
  <text x="630" y="203" font-size="20" text-anchor="middle" font-family="serif">👨‍💻</text>
  <rect x="534" y="254" width="120" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="534" y="268" width="192" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="534" y="280" width="170" height="6" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="534" y="295" width="80" height="20" rx="6" fill="rgba(255,45,120,0.8)"/>
  <text x="574" y="309" font-size="9" fill="white" text-anchor="middle" font-family="Arial">HIRE ME</text>
  <rect x="620" y="295" width="80" height="20" rx="6" fill="rgba(245,255,0,0.2)" stroke="rgba(245,255,0,0.5)" stroke-width="1"/>
  <text x="660" y="309" font-size="9" fill="rgba(245,255,0,0.9)" text-anchor="middle" font-family="Arial">PROJECTS</text>
  <!-- Deploy button -->
  <rect x="60" y="370" width="680" height="35" rx="10" fill="rgba(245,255,0,0.9)"/>
  <text x="400" y="393" font-size="13" fill="#0A000F" text-anchor="middle" font-family="Arial" font-weight="bold">⚡ DEPLOY MY PORTFOLIO IN 60 SECONDS</text>
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="3">PORTFOLIOGEN — AI POWERED</text>
</svg>
