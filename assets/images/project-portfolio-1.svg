  <rect x="215" y="160" width="120" height="80" rx="8" fill="rgba(245,255,0,0.2)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="275" y="210" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial">Cyber Light</text>
  <rect x="350" y="160" width="120" height="80" rx="8" fill="rgba(123,0,255,0.3)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="410" y="210" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Arial">Violet Glass</text>
  <!-- AI generating -->
  <rect x="80" y="255" width="400" height="40" rx="8" fill="rgba(255,255,255,0.06)"/>
