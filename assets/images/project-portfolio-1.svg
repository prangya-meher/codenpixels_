  <text x="400" y="110" font-size="9" fill="rgba(255,255,255,0.7)" text-anchor="middle" font-family="Arial">Theme</text>
  <rect x="414" y="84" width="92" height="2" fill="rgba(255,255,255,0.1)"/>
  <circle cx="520" cy="85" r="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
