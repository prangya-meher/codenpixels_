      <stop offset="0%" style="stop-color:#FF0A95"/>
      <stop offset="100%" style="stop-color:#FF3EA5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <pattern id="hex" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
