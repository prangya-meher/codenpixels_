  <circle cx="218" cy="137" r="1.5" fill="white"/>
  <path d="M209 133 Q216 128 223 133" stroke="#1A0A00" stroke-width="1.5" fill="none"/>
  <!-- Nose -->
  <ellipse cx="200" cy="150" rx="3" ry="2.5" fill="#E8A080"/>
  <!-- Lips -->
  <path d="M188 161 Q200 170 212 161" stroke="#FF2D78" stroke-width="2.5" fill="rgba(255,45,120,0.4)" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="156" cy="144" rx="8" ry="11" fill="#F5CBA7"/>
  <ellipse cx="244" cy="144" rx="8" ry="11" fill="#F5CBA7"/>
  <!-- Earrings -->
  <circle cx="156" cy="157" r="4" fill="#F5FF00"/>
  <circle cx="244" cy="157" r="4" fill="#F5FF00"/>
  <!-- Neck -->
  <rect x="188" y="186" width="24" height="20" rx="4" fill="#F5CBA7"/>
  <!-- Body / shirt -->
  <rect x="115" y="204" width="170" height="155" rx="22" fill="#FF2D78"/>
  <!-- Design tablet -->
  <rect x="125" y="260" width="150" height="100" rx="10" fill="#0A000F" stroke="rgba(245,255,0,0.5)" stroke-width="1.5"/>
  <rect x="133" y="268" width="134" height="80" rx="6" fill="#0F0018"/>
  <!-- Design elements on screen -->
  <circle cx="165" cy="295" r="20" fill="rgba(255,45,120,0.5)" stroke="rgba(245,255,0,0.4)" stroke-width="1"/>
  <rect x="192" y="278" width="65" height="10" rx="3" fill="rgba(245,255,0,0.6)"/>
  <rect x="192" y="293" width="50" height="7" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="192" y="305" width="55" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="133" y="322" width="134" height="18" rx="4" fill="rgba(255,45,120,0.4)"/>
  <text x="200" y="335" font-size="8" fill="white" text-anchor="middle" font-family="Arial">UI/UX PROTOTYPE</text>
