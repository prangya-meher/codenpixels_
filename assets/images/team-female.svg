  <rect x="70" y="420" width="260" height="60" rx="12" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="200" y="447" font-size="16" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">Priya Kapoor</text>
  <text x="200" y="466" font-size="11" fill="rgba(245,255,0,0.8)" text-anchor="middle" font-family="Arial">UI/UX Designer</text>
