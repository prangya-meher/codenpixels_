<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D78"/>
      <stop offset="100%" style="stop-color:#FFE500"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.15)"/>
  </pattern>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- Phone mockup -->
  <rect x="300" y="60" width="200" height="330" rx="24" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <rect x="312" y="80" width="176" height="290" rx="8" fill="#0A000F"/>
  <!-- QR code squares -->
  <rect x="330" y="100" width="60" height="60" rx="6" fill="rgba(255,45,120,0.8)"/>
  <rect x="338" y="108" width="44" height="44" rx="3" fill="#0A000F"/>
  <rect x="344" y="114" width="32" height="32" rx="2" fill="#FF2D78"/>
  <!-- Menu items -->
  <rect x="320" y="175" width="160" height="18" rx="4" fill="rgba(245,255,0,0.6)"/>
  <rect x="320" y="200" width="120" height="12" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="320" y="220" width="140" height="12" rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="320" y="240" width="100" height="12" rx="3" fill="rgba(255,255,255,0.2)"/>
  <rect x="320" y="265" width="160" height="18" rx="4" fill="rgba(245,255,0,0.4)"/>
  <rect x="320" y="290" width="130" height="12" rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="320" y="310" width="110" height="12" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Label -->
  <text x="400" y="430" font-family="Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="3">QR MENU SYSTEM</text>
  <!-- Decorative circles -->
  <circle cx="120" cy="100" r="80" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="680" cy="350" r="100" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="680" cy="350" r="60" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
