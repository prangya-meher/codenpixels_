<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2D78"/>
      <stop offset="100%" style="stop-color:#FFE500"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(245,255,0,0.3)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="400" height="520" fill="url(#bg)"/>
  <rect width="400" height="520" fill="url(#glow)"/>
  <!-- Grid pattern -->
  <pattern id="g" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  </pattern>
  <rect width="400" height="520" fill="url(#g)"/>
  <!-- Person silhouette -->
  <circle cx="200" cy="160" r="80" fill="rgba(0,0,0,0.35)"/>
  <circle cx="200" cy="145" r="52" fill="rgba(255,255,255,0.15)"/>
  <!-- Face -->
  <circle cx="200" cy="138" r="42" fill="#FDBCB4"/>
  <!-- Hair -->
  <ellipse cx="200" cy="106" rx="42" ry="22" fill="#2C1810"/>
  <rect x="158" y="106" width="84" height="20" fill="#2C1810"/>
  <!-- Eyes -->
  <circle cx="185" cy="135" r="5" fill="#2C1810"/>
  <circle cx="215" cy="135" r="5" fill="#2C1810"/>
  <circle cx="187" cy="133" r="2" fill="white"/>
  <circle cx="217" cy="133" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="200" cy="147" rx="4" ry="3" fill="#E8A090"/>
  <!-- Mouth -->
  <path d="M188 158 Q200 168 212 158" stroke="#C07060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="157" cy="138" rx="8" ry="12" fill="#FDBCB4"/>
  <ellipse cx="243" cy="138" rx="8" ry="12" fill="#FDBCB4"/>
  <!-- Neck -->
  <rect x="187" y="178" width="26" height="24" rx="4" fill="#FDBCB4"/>
  <!-- Body / shirt -->
  <rect x="120" y="200" width="160" height="160" rx="20" fill="#1A0030"/>
  <!-- Collar -->
  <path d="M178 200 L200 230 L222 200" fill="white" opacity="0.9"/>
  <!-- Laptop -->
  <rect x="130" y="310" width="140" height="90" rx="8" fill="#0A000F" stroke="rgba(245,255,0,0.4)" stroke-width="1.5"/>
  <rect x="138" y="318" width="124" height="70" rx="4" fill="#0F0018"/>
  <!-- Code on screen -->
  <rect x="145" y="325" width="60" height="5" rx="2" fill="rgba(255,45,120,0.7)"/>
  <rect x="145" y="335" width="90" height="4" rx="2" fill="rgba(245,255,0,0.5)"/>
  <rect x="155" y="344" width="70" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="145" y="353" width="80" height="4" rx="2" fill="rgba(204,255,0,0.5)"/>
  <rect x="145" y="363" width="50" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- Name tag -->
  <rect x="80" y="420" width="240" height="60" rx="12" fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="200" y="447" font-size="16" fill="white" text-anchor="middle" font-family="Arial" font-weight="bold">Arjun Sharma</text>
  <text x="200" y="466" font-size="11" fill="rgba(245,255,0,0.8)" text-anchor="middle" font-family="Arial">Lead Developer &amp; Co-founder</text>
</svg>
