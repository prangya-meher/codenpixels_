<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 380" width="300" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5FF00"/>
      <stop offset="100%" style="stop-color:#7B00FF"/>
    </linearGradient>
  </defs>
  <!-- Character holding message -->
  <circle cx="150" cy="110" r="55" fill="rgba(255,45,120,0.15)" stroke="rgba(255,45,120,0.3)" stroke-width="1"/>
  <!-- Head -->
  <circle cx="150" cy="100" r="36" fill="#FDBCB4"/>
  <!-- Hair -->
  <ellipse cx="150" cy="70" rx="36" ry="20" fill="#2C1810"/>
  <rect x="114" y="70" width="72" height="18" fill="#2C1810"/>
  <!-- Eyes -->
  <circle cx="138" cy="97" r="4" fill="#2C1810"/>
  <circle cx="162" cy="97" r="4" fill="#2C1810"/>
  <circle cx="139.5" cy="95.5" r="1.5" fill="white"/>
  <circle cx="163.5" cy="95.5" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M140 108 Q150 116 160 108" stroke="#C07060" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="141" y="134" width="18" height="16" rx="3" fill="#FDBCB4"/>
  <!-- Body -->
  <rect x="100" y="148" width="100" height="90" rx="18" fill="#7B00FF"/>
  <!-- Arms -->
  <rect x="72" y="155" width="30" height="14" rx="7" fill="#FDBCB4" transform="rotate(20 87 162)"/>
  <rect x="198" y="155" width="30" height="14" rx="7" fill="#FDBCB4" transform="rotate(-20 213 162)"/>
  <!-- Message bubble being held -->
  <rect x="60" y="230" width="180" height="100" rx="16" fill="rgba(0,0,0,0.55)" stroke="rgba(245,255,0,0.4)" stroke-width="1.5"/>
  <polygon points="135,230 115,210 155,210" fill="rgba(0,0,0,0.55)"/>
  <text x="150" y="264" font-size="22" text-anchor="middle" font-family="serif">📩</text>
  <rect x="78" y="276" width="144" height="8" rx="4" fill="rgba(255,45,120,0.6)"/>
  <rect x="90" y="290" width="120" height="6" rx="3" fill="rgba(255,255,255,0.25)"/>
  <rect x="100" y="302" width="100" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  <!-- Floating elements -->
  <circle cx="40" cy="160" r="12" fill="rgba(255,45,120,0.3)" stroke="rgba(255,45,120,0.5)" stroke-width="1"/>
  <text x="40" y="165" font-size="10" text-anchor="middle" font-family="serif">✉️</text>
  <circle cx="260" cy="180" r="12" fill="rgba(245,255,0,0.3)" stroke="rgba(245,255,0,0.5)" stroke-width="1"/>
  <text x="260" y="185" font-size="10" text-anchor="middle" font-family="serif">💬</text>
  <circle cx="50" cy="280" r="8" fill="rgba(123,0,255,0.4)"/>
  <circle cx="260" cy="290" r="8" fill="rgba(255,45,120,0.4)"/>
  <!-- Stars -->
  <text x="28" y="240" font-size="14" opacity="0.6">⭐</text>
  <text x="258" y="140" font-size="14" opacity="0.6">✨</text>
  <text x="270" y="340" font-size="14" opacity="0.5">🌟</text>
</svg>
